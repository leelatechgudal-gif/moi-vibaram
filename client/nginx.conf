server {
    listen 80;
    server_name leelatech.co.in www.leelatech.co.in;
    return 301 https://$host$request_uri;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend server
    # Note: In production, the backend URL should be injectable or handled by the cloud provider
    location /api/ {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://backend:5001;
    }
}

server {
    listen 443 ssl;

    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/leelatech.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leelatech.co.in/privkey.pem;

     location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend server
    # Note: In production, the backend URL should be injectable or handled by the cloud provider
    location /api/ {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://backend:5001;
    }
}
