version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: moi-vibaram-server
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb+srv://leelatechgudal_db_user:GjwJVNLkMNx0P1P0@leelatechcluster.pqkloc9.mongodb.net/?appName=LeelaTechCluster
      - JWT_SECRET=REPLACE_ME_WITH_64_BYTE_RANDOM_HEX
      - JWT_EXPIRES_IN=15m
      - CLIENT_URL=http://host.docker.internal:80 # use localhost if not using docker 
      - EMAIL_USER=anand@leelatech.co.in
      - EMAIL_PASS=your_app_password
    volumes:
      - ./uploads:/usr/src/uploads

  # Frontend Client
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: moi-vibaram-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt